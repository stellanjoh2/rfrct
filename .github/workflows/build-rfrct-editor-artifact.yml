# Builds rfrct-editor and uploads dist/ as a downloadable Actions artifact.
# Does NOT publish to GitHub Pages — only "Deploy Blod to GitHub Pages" should use
# upload-pages-artifact for this repo (one live URL: https://<user>.github.io/<repo>/).

name: Build rfrct-editor (artifact)

on:
  push:
    branches: [main]
    paths:
      - "apps/rfrct-editor/**"
      - "packages/rfrct-core/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-rfrct-editor-artifact.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/rfrct-editor/**"
      - "packages/rfrct-core/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-rfrct-editor-artifact.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Workaround for npm optional-deps bug that can skip Rollup's Linux binary on runners.
      - name: Ensure Rollup Linux binary is present
        if: runner.os == 'Linux'
        run: |
          node -e "require('\@rollup/rollup-linux-x64-gnu')" 2>/dev/null || npm i --no-save @rollup/rollup-linux-x64-gnu
          node -e "require('\@rollup/rollup-linux-x64-gnu'); console.log('rollup linux binary: ok')"
      - name: Build editor (tsc + Vite via workspace script)
        run: |
          npm run build -w rfrct-editor || (
            echo "first build failed, reinstalling Rollup Linux binary and retrying once" &&
            npm i --no-save @rollup/rollup-linux-x64-gnu &&
            npm run build -w rfrct-editor
          )
      - name: Verify production bundle (not dev index)
        run: |
          test -f apps/rfrct-editor/dist/index.html
          grep -q 'assets/index-.*\.js' apps/rfrct-editor/dist/index.html || (echo "dist/index.html missing hashed JS bundle — check vite build"; exit 1)
          ! grep -q '/src/main.tsx' apps/rfrct-editor/dist/index.html || (echo "dev index leaked into dist"; exit 1)
      - uses: actions/upload-artifact@v7
        with:
          name: rfrct-editor-dist
          path: apps/rfrct-editor/dist
