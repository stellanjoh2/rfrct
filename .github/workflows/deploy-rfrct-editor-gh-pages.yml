# Publishes the Rfrct distortion tool (apps/rfrct-editor) to GitHub Pages.
#
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions,
# then select this workflow (or allow it to run on push to main).
#
# Live URL: https://<owner>.github.io/<repo>/  (e.g. /rfrct/)
#
# Two jobs (build → deploy) match GitHub’s Pages starters and actions/deploy-pages
# recommendations. The deploy job only runs deploy-pages and uses actions:read to fetch
# the uploaded artifact (same pattern as deploy-blod-gh-pages.yml).
#
# Use a dedicated concurrency group — do NOT share `group: pages` with
# `deploy-blod-gh-pages.yml` (that workflow uses cancel-in-progress and would
# cancel this run when a manual Blod Pages deploy is triggered).
#
# Order: configure-pages → build → upload artifact → deploy job fetches artifact.

name: Deploy Rfrct editor to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/rfrct-editor/**"
      - "packages/rfrct-core/**"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/deploy-rfrct-editor-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-rfrct-editor
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write
    steps:
      - uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      # Vitest (esbuild) and Vite build (Rollup) need platform binaries; npm can omit optional deps on some runners.
      - name: Ensure Rollup + esbuild Linux binaries
        if: runner.os == 'Linux'
        run: |
          node -e "require('\@rollup/rollup-linux-x64-gnu')" 2>/dev/null || npm i --no-save @rollup/rollup-linux-x64-gnu
          node -e "require('esbuild').transformSync('0',{loader:'js'})" 2>/dev/null || npm i --no-save @esbuild/linux-x64
          node -e "require('\@rollup/rollup-linux-x64-gnu'); require('esbuild').transformSync('0',{loader:'js'}); console.log('native bins: ok')"
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test

      # Split so logs show whether tsc or Vite failed (single `npm run build` hides the boundary).
      - name: Diagnostics
        run: |
          node -v
          npm -v
          uname -a

      - name: Build editor (tsc + Vite via workspace script)
        run: |
          npm run build -w rfrct-editor || (
            echo "first build failed, reinstalling Rollup Linux binary and retrying once" &&
            npm i --no-save @rollup/rollup-linux-x64-gnu &&
            npm run build -w rfrct-editor
          )

      # Pages rejects artifacts without o+rx on dirs / o+r on files (deployment_perms_error on deploy).
      - name: Normalize dist permissions for Pages
        run: chmod -R +rX apps/rfrct-editor/dist

      - name: Verify production bundle
        run: |
          test -f apps/rfrct-editor/dist/index.html
          grep -q 'assets/index-.*\.js' apps/rfrct-editor/dist/index.html || (echo "missing hashed JS"; exit 1)
          ! grep -q '/src/main.tsx' apps/rfrct-editor/dist/index.html || (echo "dev index leaked"; exit 1)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/rfrct-editor/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
