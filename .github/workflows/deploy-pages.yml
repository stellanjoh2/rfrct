# Publishes dist/ via GitHub’s Pages Actions deploy.
#
# In Settings → Pages, pick ONE source:
# • GitHub Actions — use this workflow; OR
# • Deploy from branch → folder /docs — use sync-docs.yml + committed docs/ (not root).
#
# Do NOT use “Deploy from branch” → / (root): that serves dev index.html (/src/main.tsx).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify production bundle (not dev index)
        run: |
          test -f apps/refract-editor/dist/index.html
          grep -q 'assets/index-.*\.js' apps/refract-editor/dist/index.html || (echo "dist/index.html missing hashed JS bundle — check vite build"; exit 1)
          ! grep -q '/src/main.tsx' apps/refract-editor/dist/index.html || (echo "dev index leaked into dist"; exit 1)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/refract-editor/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
