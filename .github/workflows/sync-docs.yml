# Copies rfrct-editor dist into docs/ and commits to main — for the *legacy* Pages mode
# "Deploy from a branch" → /docs (not for Actions-based Blod deploy).
#
# Not run on every push: direct pushes to protected main often fail with 403 from
# github-actions[bot]. Run manually when you need docs/ updated, or add the bot to
# branch bypass rules / use a PAT in secrets.

name: Sync docs for GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build:editor
      - name: Copy dist to docs (include dotfiles like .nojekyll)
        run: |
          rm -rf docs
          mkdir -p docs
          cp -a apps/rfrct-editor/dist/. docs/
      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No changes to docs"
            exit 0
          fi
          git commit -m "chore: sync docs from dist"
          git push
