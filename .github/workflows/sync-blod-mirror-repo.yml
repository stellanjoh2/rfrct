# After you push to `main` in this monorepo, mirror `apps/blod/` to https://github.com/stellanjoh2/blod
# so GitHub Pages (https://stellanjoh2.github.io/blod/) rebuilds — same end result as
# `bash scripts/push-blod-to-blod-repo.sh` locally.
#
# Optional: add BLOD_MIRROR_PUSH_TOKEN or BLOD_MIRROR_TOKEN (Settings → Secrets → Actions) to push the
# subtree to https://github.com/stellanjoh2/blod . If unset, the workflow still succeeds and only skips the push.
#   • Fine-grained PAT: Contents read+write on stellanjoh2/blod only, or classic `repo` scope.
name: Sync Blod folder to stellanjoh2/blod

on:
  workflow_dispatch:

concurrency:
  group: sync-blod-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Subtree split (apps/blod → branch)
        run: |
          set -euo pipefail
          git branch -D blod-standalone 2>/dev/null || true
          git subtree split --prefix=apps/blod -b blod-standalone

      - name: Push to stellanjoh2/blod
        env:
          TOKEN_PUSH: ${{ secrets.BLOD_MIRROR_PUSH_TOKEN }}
          TOKEN_ALT: ${{ secrets.BLOD_MIRROR_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="${TOKEN_PUSH:-${TOKEN_ALT:-}}"
          if [ -z "${TOKEN}" ]; then
            echo "::warning::Set BLOD_MIRROR_PUSH_TOKEN or BLOD_MIRROR_TOKEN — skipping push to stellanjoh2/blod (mirror is optional)."
            exit 0
          fi
          git push "https://x-access-token:${TOKEN}@github.com/stellanjoh2/blod.git" blod-standalone:main
