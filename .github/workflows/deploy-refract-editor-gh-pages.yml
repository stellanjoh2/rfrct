# Publishes the Refrct distortion tool (apps/refract-editor) to GitHub Pages.
#
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions,
# then select this workflow (or allow it to run on push to main).
#
# Live URL: https://<owner>.github.io/<repo>/  (e.g. /rfrct/)
#
# Single job (upload + deploy) matches GitHub’s static Pages starter and avoids
# cross-job artifact permission issues between build and deploy jobs.
#
# Use a dedicated concurrency group — do NOT share `group: pages` with
# `deploy-blod-gh-pages.yml` (that workflow uses cancel-in-progress and would
# cancel this run when a manual Blod Pages deploy is triggered).
#
# Order matches GitHub’s static Pages starter: configure-pages → build → upload → deploy.

name: Deploy Refract editor to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Workflow-level default; job also sets permissions explicitly for clarity.
permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages-refract-editor
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      # Split so logs show whether tsc or Vite failed (single `npm run build` hides the boundary).
      - name: Diagnostics
        run: |
          node -v
          npm -v
          uname -a

      - name: Typecheck editor (tsc)
        run: npm exec -w refrct-editor -- tsc --noEmit

      - name: Build editor bundle (Vite)
        run: npm exec -w refrct-editor -- vite build

      # Pages rejects artifacts without o+rx on dirs / o+r on files (deployment_perms_error on deploy).
      - name: Normalize dist permissions for Pages
        run: chmod -R +rX apps/refract-editor/dist

      - name: Verify production bundle
        run: |
          test -f apps/refract-editor/dist/index.html
          grep -q 'assets/index-.*\.js' apps/refract-editor/dist/index.html || (echo "missing hashed JS"; exit 1)
          ! grep -q '/src/main.tsx' apps/refract-editor/dist/index.html || (echo "dev index leaked"; exit 1)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/refract-editor/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
