# Builds Blod and deploys via GitHub Pages Actions.
#
# Works from:
#   • Full rfrct monorepo (apps/blod + packages/rfrct-core), or
#   • Standalone Blod at repo root (vite + package.json) — clones @rfrct/core from owner/rfrct (default) if missing.
#
# Settings → Pages → Source: GitHub Actions
#
# Clone source for @rfrct/core when packages/rfrct-core is missing (standalone repos):
#   • Default clone URL: https://github.com/<owner>/<REFRCT_MONOREPO_REPO>
#   • Set repo variable REFRCT_MONOREPO_REPO if your monorepo slug is not "rfrct".
#   • Private monorepo: secret REFRCT_CLONE_PAT (Contents: Read), or commit packages/rfrct-core here.

# Manual preview only: publishes Blod to THIS repo’s Pages (https://<user>.github.io/<monorepo>/).
# The public Blod site at github.io/<user>/blod/ is deployed from the separate `blod` repo.
#
# Concurrency group must differ from `deploy-rfrct-editor-gh-pages.yml` so a manual Blod
# preview run does not cancel the automatic Rfrct editor Pages deployment (same repo URL).
name: Deploy Blod to GitHub Pages

on:
  workflow_dispatch:

# Job-level permissions override these; build needs actions:write, deploy needs actions:read for artifacts.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-blod-preview
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write
    env:
      REFRCT_MONOREPO_REPO: ${{ vars.REFRCT_MONOREPO_REPO }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate layout
        run: |
          if [ -f apps/blod/package.json ]; then exit 0; fi
          if [ -f vite.config.ts ] && [ -f package.json ]; then exit 0; fi
          echo "::error::Need apps/blod (monorepo) or a Vite app at repo root (package.json + vite.config.ts)."
          exit 1

      - name: Restore packages/rfrct-core (if missing)
        if: hashFiles('packages/rfrct-core/package.json') == ''
        env:
          OWNER: ${{ github.repository_owner }}
          PAT: ${{ secrets.REFRCT_CLONE_PAT }}
        run: |
          set -euo pipefail
          REPO="${REFRCT_MONOREPO_REPO:-rfrct}"
          echo "Using monorepo repo: ${OWNER}/${REPO} (override with repo variable REFRCT_MONOREPO_REPO)"
          URL="https://github.com/${OWNER}/${REPO}.git"
          if [ -n "${PAT:-}" ]; then
            URL="https://x-access-token:${PAT}@github.com/${OWNER}/${REPO}.git"
            echo "Cloning using REFRCT_CLONE_PAT"
          else
            echo "Cloning public repo (set REFRCT_CLONE_PAT if the monorepo is private)"
          fi
          if ! git clone --depth 1 "$URL" _rfrct_src; then
            echo "::error::git clone failed. Expected https://github.com/${OWNER}/${REPO} — check repo name (variable REFRCT_MONOREPO_REPO), visibility, or secret REFRCT_CLONE_PAT; or commit packages/rfrct-core into this repository."
            exit 1
          fi
          mkdir -p packages
          cp -a _rfrct_src/packages/rfrct-core packages/rfrct-core
          rm -rf _rfrct_src

      - name: Point @rfrct/core at local package (standalone repos)
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          if grep -q '"workspaces"' package.json 2>/dev/null; then
            echo "Monorepo — npm workspaces resolve @rfrct/core"
            exit 0
          fi
          REPO="${REFRCT_MONOREPO_REPO:-rfrct}"
          test -f packages/rfrct-core/package.json || {
            echo "::error::packages/rfrct-core missing. Clone must succeed for https://github.com/${OWNER}/${REPO} (variable REFRCT_MONOREPO_REPO), or commit packages/rfrct-core."
            exit 1
          }
          python3 << 'PY'
          import json
          with open("package.json", encoding="utf-8") as f:
              p = json.load(f)
          p.setdefault("dependencies", {})
          p["dependencies"]["@rfrct/core"] = "file:./packages/rfrct-core"
          with open("package.json", "w", encoding="utf-8") as f:
              json.dump(p, f, indent=2)
              f.write("\n")
          PY

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: |
          if grep -q '"workspaces"' package.json 2>/dev/null; then
            npm ci
          else
            npm install
          fi

      - name: Build Blod (monorepo)
        if: hashFiles('apps/blod/package.json') != ''
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build:blod

      - name: Build (root Vite app)
        if: hashFiles('apps/blod/package.json') == '' && hashFiles('vite.config.ts') != ''
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Verify static output exists
        run: |
          set -euo pipefail
          if [ -f apps/blod/package.json ]; then
            test -d apps/blod/dist && test -f apps/blod/dist/index.html || { echo "::error::apps/blod/dist or index.html missing after build"; ls -la apps/blod || true; exit 1; }
          elif [ -f vite.config.ts ]; then
            test -d dist && test -f dist/index.html || { echo "::error::dist/ missing after root build"; exit 1; }
          fi

      - name: Artifact path
        id: dist
        run: |
          if [ -d apps/blod/dist ]; then echo "path=apps/blod/dist" >> "$GITHUB_OUTPUT"
          elif [ -d dist ]; then echo "path=dist" >> "$GITHUB_OUTPUT"
          else echo "::error::No dist output"; exit 1; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.dist.outputs.path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
