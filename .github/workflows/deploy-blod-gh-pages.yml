# Builds Blod and deploys via GitHub Pages Actions.
#
# Works from:
#   • Full refrct monorepo (apps/blod + packages/refract-core), or
#   • Standalone Blod at repo root (vite + package.json) — clones @refrct/core from <owner>/refrct if missing.
#
# Settings → Pages → Source: GitHub Actions

name: Deploy Blod to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate layout
        run: |
          if [ -f apps/blod/package.json ]; then exit 0; fi
          if [ -f vite.config.ts ] && [ -f package.json ]; then exit 0; fi
          echo "::error::Need apps/blod (monorepo) or a Vite app at repo root (package.json + vite.config.ts)."
          exit 1

      - name: Restore packages/refract-core (if missing)
        if: hashFiles('packages/refract-core/package.json') == ''
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          echo "Cloning @refrct/core from https://github.com/${OWNER}/refrct"
          git clone --depth 1 "https://github.com/${OWNER}/refrct.git" _refrct_src
          mkdir -p packages
          cp -a _refrct_src/packages/refract-core packages/refract-core
          rm -rf _refrct_src

      - name: Point @refrct/core at local package (standalone repos)
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          if grep -q '"workspaces"' package.json 2>/dev/null; then
            echo "Monorepo — npm workspaces resolve @refrct/core"
            exit 0
          fi
          test -f packages/refract-core/package.json || {
            echo "::error::packages/refract-core missing. Ensure https://github.com/${OWNER}/refrct exists and is public so CI can clone it."
            exit 1
          }
          python3 << 'PY'
          import json
          with open("package.json", encoding="utf-8") as f:
              p = json.load(f)
          p.setdefault("dependencies", {})
          p["dependencies"]["@refrct/core"] = "file:./packages/refract-core"
          with open("package.json", "w", encoding="utf-8") as f:
              json.dump(p, f, indent=2)
              f.write("\n")
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: |
          if grep -q '"workspaces"' package.json 2>/dev/null; then
            npm ci
          else
            npm install
          fi

      - name: Build Blod (monorepo)
        if: hashFiles('apps/blod/package.json') != ''
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build:blod

      - name: Build (root Vite app)
        if: hashFiles('apps/blod/package.json') == '' && hashFiles('vite.config.ts') != ''
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Artifact path
        id: dist
        run: |
          if [ -d apps/blod/dist ]; then echo "path=apps/blod/dist" >> "$GITHUB_OUTPUT"
          elif [ -d dist ]; then echo "path=dist" >> "$GITHUB_OUTPUT"
          else echo "::error::No dist output"; exit 1; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.dist.outputs.path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
