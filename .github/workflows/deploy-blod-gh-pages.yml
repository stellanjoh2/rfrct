# Builds Blod and deploys via GitHub’s official Pages Actions (same stack as “pages build and deployment”).
#
# After first green run: Settings → Pages → Source: GitHub Actions (not “branch”).
# URL: https://<owner>.github.io/<repo>/
#
# Only one site per repo — if another workflow also deploys Pages, disable it or they’ll fight.

name: Deploy Blod to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate layout
        run: |
          if [ -f apps/blod/package.json ]; then exit 0; fi
          if [ -f vite.config.ts ] && [ -f package.json ]; then exit 0; fi
          echo "::error::Need apps/blod (monorepo) or a Vite app at repo root."
          exit 1

      - name: Restore packages/refract-core (if missing)
        if: hashFiles('packages/refract-core/package.json') == ''
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          if [ ! -f apps/blod/package.json ]; then exit 0; fi
          git clone --depth 1 "https://github.com/${OWNER}/refrct.git" _refrct_src
          mkdir -p packages
          cp -a _refrct_src/packages/refract-core packages/refract-core
          rm -rf _refrct_src

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build Blod (monorepo)
        if: hashFiles('apps/blod/package.json') != ''
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build:blod

      - name: Build (root Vite app)
        if: hashFiles('apps/blod/package.json') == '' && hashFiles('vite.config.ts') != ''
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Artifact path
        id: dist
        run: |
          if [ -d apps/blod/dist ]; then echo "path=apps/blod/dist" >> "$GITHUB_OUTPUT"
          elif [ -d dist ]; then echo "path=dist" >> "$GITHUB_OUTPUT"
          else echo "::error::No dist output"; exit 1; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.dist.outputs.path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
